# Korean Sentence Explainer Evaluation Set
# 50 sentences across beginner/intermediate/advanced levels
#
# Categories:
#   beginner (15): basic sentence patterns, 하다 verbs, particles
#   intermediate (20): connective endings, indirect speech, passive/causative
#   advanced (15): idioms, contractions, literary style

# ════════════════════════════════════════════════════════════
# BEGINNER (TOPIK 1-2)
# ════════════════════════════════════════════════════════════

- vars:
    sentence_input: '{"sentence": "저는 학생입니다.", "tokenization": [], "candidateVocabulary": [], "candidateGrammar": []}'
  assert:
    - type: javascript
      value: 'const o = JSON.parse(output); return { pass: (o.vocabulary||[]).some(v => v.surface.includes("학생")), reason: "Must identify 학생" };'

